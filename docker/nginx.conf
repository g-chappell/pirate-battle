# nginx reverse proxy — /etc/nginx/sites-available/pirate-battle.conf
#
# After copying here:
#   sudo ln -sf /etc/nginx/sites-available/pirate-battle.conf \
#               /etc/nginx/sites-enabled/pirate-battle.conf
#   sudo nginx -t && sudo systemctl reload nginx
#
# TLS via certbot (recommended):
#   sudo apt install certbot python3-certbot-nginx
#   sudo certbot --nginx -d pirate-battle.blacksail.dev

server {
    listen 80;
    server_name pirate-battle.blacksail.dev;

    # ACME challenge for certbot
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    # Redirect all HTTP to HTTPS after TLS is configured
    # (uncomment after certbot runs)
    # return 301 https://$host$request_uri;

    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 60s;
    }

    # Health check — allow direct access without proxying side effects
    location = /health {
        proxy_pass http://127.0.0.1:3001/health;
        access_log off;
    }
}

# After certbot runs, it auto-inserts the 443 block + cert paths.
